name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        # Trim the Windows leg to two Python versions to save CI minutes; the
        # POSIX-specific tests (real true/false, /etc paths, symlink privilege)
        # are skipped on Windows with an explicit reason.
        exclude:
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --extra dev --extra mcp
      - name: Ruff
        if: runner.os == 'Linux'
        run: uv run ruff check src tests
      - name: Mypy
        if: runner.os == 'Linux'
        run: uv run mypy src/ckdn
      - name: Ty
        if: runner.os == 'Linux'
        run: uv run ty check src/ckdn
      - name: Verify config lock
        if: runner.os == 'Linux'
        run: uv run ckdn verify-config --locked
      - name: Pytest
        run: uv run pytest -q

  codeclone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run CodeClone
        uses: orenlab/codeclone/.github/actions/codeclone@v2.1.0a1
        with:
          fail-on-new: "true"
          sarif: "true"
          pr-comment: "true"
