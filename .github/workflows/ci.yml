name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --extra dev --extra mcp
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy src/ckdn
      - name: Ty
        run: uv run ty check src/ckdn
      - name: Pytest
        run: uv run pytest -q

  codeclone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run CodeClone
        uses: orenlab/codeclone/.github/actions/codeclone@v2.1.0a1
        with:
          fail-on-new: "true"
          sarif: "true"
          pr-comment: "true"
